<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakers Bridge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    background: #1a1a1a;
}

nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 15px;
}

nav button {
    background: #222;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

nav button:hover {
    background: gold;
    color: black;
}

section {
    padding: 30px;
    display: none;
}

.active {
    display: block;
}

.hero {
    text-align: center;
    padding: 50px 20px;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    margin: 10px 0;
    box-shadow: 0 0 10px rgba(255,215,0,0.1);
}

.lock-btn {
    color: gold;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🍰 Bakers Bridge</header>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('gallery')">Gallery</button>
<button class="lock-btn" onclick="checkAccess()">🔒 Premium</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
<h1>Welcome to Bakers Bridge</h1>
<p>Premium platform for chefs & suppliers</p>
</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>
<div class="card">Chocolate Cake</div>
<div class="card">Wedding Cake</div>
<div class="card">Cupcakes</div>
</section>

<!-- PREMIUM -->
<section id="premium">
<h2>Supplier Dashboard</h2>

<div class="card">
<h3>Chocolate Supplier</h3>
<p>Price: ₹500/kg</p>
<p>Quantity: Available</p>
</div>

<div class="card">
<h3>Packaging Supplier</h3>
<p>Price: ₹10/box</p>
<p>Quantity: 1000+</p>
</div>

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

/* ✅ PREMIUM USERS */
const premiumUsers = [
  "your@gmail.com",
  "client@gmail.com"
];

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

window.checkAccess = function () {
  if (!currentUser) {
    signInWithPopup(auth, provider)
      .then((result) => {
        currentUser = result.user;
        verifyPremium();
      })
      .catch(err => alert("Login Failed"));
  } else {
    verifyPremium();
  }
};

function verifyPremium() {
  if (premiumUsers.includes(currentUser.email)) {
    alert("Access Granted ✅");
    showPage("premium");
  } else {
    alert("No Premium Access ❌");
  }
}

window.showPage = function(page) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(page).classList.add("active");
};
</script>

</body>
</html>
