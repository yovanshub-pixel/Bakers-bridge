<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bakers Bridge</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{font-family:sans-serif;margin:0}
.pg{display:none}
.pg.on{display:block}
.suplock{cursor:pointer;background:#eee;padding:20px;margin:10px}
nav{padding:10px;background:#333;color:white}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<nav>
<button onclick="go('home')">Home</button>
<button onclick="go('pricing')">Pricing</button>
<button onclick="loginUser()">Login</button>
</nav>

<div id="pg-home" class="pg on">
<h2>Home</h2>
<button onclick="go('pricing')">Go Pricing</button>
</div>

<div id="pg-pricing" class="pg">
<h2>Premium Section</h2>

<div class="suplock" onclick="handlePremiumClick()">🔒 Supplier 1</div>
<div class="suplock" onclick="handlePremiumClick()">🔒 Supplier 2</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "bakersbridge.firebaseapp.com",
  projectId: "bakersbridge"
};
firebase.initializeApp(firebaseConfig);

let isPremiumUser = false;

// LOGIN
function loginUser(){
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then(res=>{
      const email = res.user.email;

      if(email === "yovanshub@gmail.com"){
        isPremiumUser = true;
        unlockPremium();
        alert("Premium unlocked");
      } else {
        showPopup();
      }
    });
}

// POPUP
function showPopup(){
  alert("Upgrade to premium");
}

// UNLOCK
function unlockPremium(){
  document.querySelectorAll('.suplock').forEach(el=>{
    el.innerHTML = "Unlocked ✅";
  });
}

// CLICK
function handlePremiumClick(){
  isPremiumUser ? unlockPremium() : showPopup();
}

// NAV
function go(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
}

</script>

</body>
</html>
