<!DOCTYPE html>
<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#FDF6EC;--warm:#F5E6CC;--gold:#C8962A;--gold-light:#E8B84B;
  --gold-dark:#9A7020;--brown:#3D2B1F;--brown-mid:#6B4C35;--brown-light:#9A7B65;
  --text:#2C1A0E;--text-muted:#7A5C45;--white:#FFFFFF;--card:#FFFDF8;
  --border:rgba(200,150,42,0.18);
}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--warm);}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}

nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(253,246,236,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 3rem;height:68px;display:flex;align-items:center;justify-content:space-between;transition:box-shadow 0.3s;}
nav.scrolled{box-shadow:0 4px 20px rgba(61,43,31,0.1);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-img{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid var(--border);}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--brown);}
.logo-text span{color:var(--gold);}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{text-decoration:none;color:var(--text-muted);font-size:14px;font-weight:500;transition:color 0.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:var(--gold);transition:width 0.2s;}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::after{width:100%;}
.nav-actions{display:flex;gap:10px;align-items:center;}
.btn-nav-outline{background:transparent;color:var(--brown);border:1.5px solid var(--border);padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.btn-nav-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-nav-solid{background:var(--gold);color:var(--white);border:none;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.btn-nav-solid:hover{background:var(--gold-dark);}

/* ------------------- existing page styles ------------------- */
.hero{min-height:100vh;padding:120px 3rem 80px;display:flex;align-items:center;background:var(--cream);position:relative;overflow:hidden;}
.hero-pattern{position:absolute;inset:0;opacity:0.04;background-image:repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);background-size:20px 20px;}
.hero-orb{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(200,150,42,0.12),transparent 70%);}
.hero-orb.o1{width:700px;height:700px;top:-200px;right:-150px;}
.hero-orb.o2{width:400px;height:400px;bottom:-100px;left:-100px;}
.hero-inner{max-width:1200px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
.hero-left{position:relative;z-index:1;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,150,42,0.12);color:var(--gold-dark);padding:7px 18px;border-radius:30px;font-size:12px;font-weight:600;letter-spacing:0.5px;margin-bottom:1.5rem;border:1px solid rgba(200,150,42,0.25);animation:fadeUp 0.6s ease both;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,5vw,4.2rem);font-weight:700;line-height:1.1;color:var(--brown);margin-bottom:1.5rem;animation:fadeUp 0.6s ease 0.1s both;}
.hero h1 em{color:var(--gold);font-style:normal;}
.hero-desc{font-size:1.05rem;color:var(--text-muted);line-height:1.75;margin-bottom:2rem;max-width:480px;animation:fadeUp 0.6s ease 0.2s both;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp 0.6s ease 0.3s both;}
.btn-primary{background:var(--gold);color:var(--white);border:none;padding:14px 32px;border-radius:30px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.25s;}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-2px);box-shadow:0 8px 20px rgba(200,150,42,0.3);}
.btn-outline{background:transparent;color:var(--brown);border:1.5px solid var(--brown-mid);padding:14px 32px;border-radius:30px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.25s;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.hero-stats{display:flex;gap:2.5rem;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);animation:fadeUp 0.6s ease 0.4s both;}

.hero-right{position:relative;height:600px;z-index:1;animation:fadeUp 0.6s ease 0.2s both;}
.float-card{position:absolute;background:var(--card);border-radius:18px;border:1px solid var(--border);padding:1.25rem;box-shadow:0 8px 32px rgba(61,43,31,0.1);}
.float-card.main{width:270px;top:20px;left:10px;animation:float1 4s ease-in-out infinite;}
.float-card.side{width:230px;top:220px;right:0px;animation:float2 5s ease-in-out infinite;}
.float-card.bottom{width:260px;bottom:20px;left:30px;animation:float1 6s ease-in-out infinite;}
.fc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.fc-logo{width:48px;height:48px;border-radius:12px;flex-shrink:0;overflow:hidden;border:1px solid var(--border);}
.fc-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.fc-logo.empty{background:var(--cream);border:2px dashed rgba(200,150,42,0.3);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:18px;}
.fc-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--brown);line-height:1.2;}
.fc-spec{font-size:10px;color:var(--text-muted);margin-top:2px;}
.fc-badge{display:inline-block;background:rgba(200,150,42,0.15);color:var(--gold-dark);font-size:10px;padding:4px 12px;border-radius:10px;font-weight:600;margin-bottom:8px;}
.fc-badge.slot{background:rgba(61,43,31,0.07);color:var(--brown);}
.fc-bottom{display:flex;justify-content:space-between;align-items:center;}

@keyframes float1{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.search-bar-section{background:var(--white);padding:2.5rem 3rem;box-shadow:0 4px 20px rgba(61,43,31,0.07);}
.search-inner{max-width:800px;margin:0 auto;}
.search-box{display:flex;background:var(--cream);border:1.5px solid var(--border);border-radius:50px;overflow:hidden;padding:6px 6px 6px 24px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--gold);}
.search-box input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);outline:none;font-family:'Outfit',sans-serif;}
.search-box input::placeholder{color:var(--text-muted);}
.search-select{border:none;background:transparent;font-size:14px;color:var(--text-muted);outline:none;padding:0 12px;font-family:'Outfit',sans-serif;cursor:pointer;border-left:1px solid var(--border);}
.search-btn{background:var(--gold);color:var(--white);border:none;padding:10px 28px;border-radius:40px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;}
.search-btn:hover{background:var(--gold-dark);}
.area-chips{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.chip{background:var(--warm);color:var(--brown-mid);border:none;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.chip:hover,.chip.active{background:var(--gold);color:var(--white);}
