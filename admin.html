<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakers Bridge | Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#FDF6EC;--warm:#F5E6CC;--gold:#C8962A;--gold-light:#E8B84B;
  --gold-dark:#9A7020;--brown:#3D2B1F;--brown-mid:#6B4C35;--brown-light:#9A7B65;
  --text:#2C1A0E;--text-muted:#7A5C45;--white:#FFFFFF;--card:#FFFDF8;
  --border:rgba(200,150,42,0.18);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text); min-height: 100vh;}

nav{background:var(--white); border-bottom:1px solid var(--border); padding:0 3rem; height:68px; display:flex; align-items:center; justify-content:space-between;}
.logo-text{font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--brown); text-decoration:none;}
.logo-text span{color:var(--gold);}

.container{max-width:1100px; margin:3rem auto; padding:0 2rem;}
.header{margin-bottom:2rem; display:flex; justify-content:space-between; align-items:flex-end;}
.header h1{font-family:'Cormorant Garamond',serif; font-size:2.5rem; color:var(--brown);}

.card{background:var(--card); border-radius:18px; border:1px solid var(--border); padding:2rem; box-shadow:0 8px 32px rgba(61,43,31,0.05); margin-bottom:2rem;}
.card h2{font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--brown); margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem;}

.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;}
.form-group{display:flex; flex-direction:column; gap:0.5rem;}
.form-group label{font-size:13px; font-weight:600; color:var(--brown-mid);}
.form-group input, .form-group select, .form-group textarea{
  padding:12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:'Outfit',sans-serif; outline:none;
}
.form-group input:focus, .form-group textarea:focus{border-color:var(--gold);}

.btn-primary{background:var(--gold); color:var(--white); border:none; padding:12px 24px; border-radius:30px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s;}
.btn-primary:hover{background:var(--gold-dark); transform:translateY(-2px);}
.btn-secondary{background:transparent; color:var(--brown); border:1.5px solid var(--border); padding:10px 20px; border-radius:30px; cursor:pointer; font-size:14px;}

.baker-list{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:1rem;}
.baker-item{background:var(--white); padding:1rem; border-radius:12px; border:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:1rem;}
.baker-item img{width:50px; height:50px; border-radius:8px; object-fit:cover;}
.baker-info{display:flex; align-items:center; gap:1rem; flex:1;}
.baker-actions{display:flex; gap:8px;}
.btn-edit{padding:6px 12px; font-size:12px; background:var(--warm); border:none; border-radius:6px; cursor:pointer;}
.btn-delete{padding:6px 12px; font-size:12px; background:#FFE5E5; color:#D32F2F; border:none; border-radius:6px; cursor:pointer;}

#loadingOverlay{position:fixed; inset:0; background:rgba(253,246,236,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;}

@media(max-width:768px){.form-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loadingOverlay">
  <p>Verifying access...</p>
</div>

<nav>
  <a href="index.html" class="logo-text">Bakers <span>Bridge</span> Admin</a>
  <button class="btn-secondary" onclick="handleLogout()" style="padding:8px 18px; font-size:13px;">Logout</button>
</nav>

<div class="container">
  <div class="header">
    <h1 id="welcomeText">Welcome Back</h1>
    <a href="index.html" class="btn-primary" style="padding:10px 20px; text-decoration:none; font-size:14px;">View Live Site</a>
  </div>

  <div class="card">
    <h2 id="formTitle">Add New Baker</h2>
    <form id="bakerForm">
      <input type="hidden" id="editingId">
      <div class="form-grid">
        <div class="form-group">
          <label>Baker Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="category" placeholder="e.g. Cakes & Pastries">
        </div>
        <div class="form-group">
          <label>Logo URL</label>
          <input type="url" id="logo_url">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location">
        </div>
        <div class="form-group">
          <label>WhatsApp (with 91)</label>
          <input type="text" id="whatsapp">
        </div>
        <div class="form-group">
          <label>Experience</label>
          <input type="text" id="experience">
        </div>
        <div class="form-group">
          <label>Orders Completed</label>
          <input type="text" id="orders_completed">
        </div>
        <div class="form-group">
          <label>Rating</label>
          <input type="number" id="rating" step="0.1" value="4.8">
        </div>
        <div class="form-group" style="grid-column: 1/-1;">
          <label>About The Baker</label>
          <textarea id="about" rows="4"></textarea>
        </div>
        <div class="form-group" style="grid-column: 1/-1;">
          <label>Products (JSON format)</label>
          <textarea id="products" rows="4" placeholder='[{"name":"Cake", "price":"₹800", "image":""}]'></textarea>
        </div>
        <div class="form-group" style="grid-column: 1/-1;">
          <label>Reviews (JSON format)</label>
          <textarea id="reviews" rows="4" placeholder='[{"reviewer_name":"John", "rating":5, "comment":"Amazing!"}]'></textarea>
        </div>
        <div class="form-group">
          <label>Areas Served (comma separated)</label>
          <input type="text" id="areas" placeholder="e.g. Anna Nagar, Adyar, Velachery">
        </div>
        <div class="form-group">
          <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
            <input type="checkbox" id="verified" checked style="width:auto;"> Verified Status
          </label>
        </div>
      </div>
      <div style="margin-top:1.5rem; display:flex; gap:1rem;">
        <button type="submit" class="btn-primary" id="saveBtn">Save Listing</button>
        <button type="button" class="btn-secondary" id="cancelBtn" style="display:none;" onclick="resetForm()">Cancel Edit</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>Manage Your Listings</h2>
    <div id="bakerList" class="baker-list">
      <!-- Listings with Edit/Delete -->
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://qlkdxrryfpdmmbbqxkey.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsa2R4cnJ5ZnBkbW1iYnF4a2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTUzMDQsImV4cCI6MjA5Mjc5MTMwNH0.9dFamA3asEEQ4KCBbfyx3vVw0KvEgh2hA3nGbIptLew";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allBakers = [];

async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href = "index.html"; }
  else { 
    document.getElementById("loadingOverlay").style.display = "none";
    loadBakers(); 
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  window.location.href = "index.html";
}

async function loadBakers() {
  // Only select summary fields for faster listing
  const { data, error } = await supabase.from('bakers').select('id, name, logo_key, loc').order('created_at', { ascending: false });
  if (error) return;
  allBakers = data;
  const list = document.getElementById("bakerList");
  list.innerHTML = "";
  data.forEach(b => {
    const div = document.createElement("div");
    div.className = "baker-item";
    div.innerHTML = `
      <div class="baker-info">
        <img src="${b.logo_key || 'https://i.imgur.com/yteSy8p.jpeg'}">
        <div><strong>${b.name}</strong><br><small>${b.loc || 'Chennai'}</small></div>
      </div>
      <div class="baker-actions">
        <button class="btn-edit" id="edit-btn-${b.id}" onclick="editBaker('${b.id}')">Edit</button>
        <button class="btn-delete" onclick="deleteBaker('${b.id}')">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

async function editBaker(id) {
  const btn = document.getElementById(`edit-btn-${id}`);
  const originalText = btn.textContent;
  btn.textContent = "Loading...";
  btn.disabled = true;

  // Fetch full details only when editing
  const { data: b, error } = await supabase.from('bakers').select('*').eq('id', id).single();
  
  btn.textContent = originalText;
  btn.disabled = false;

  if (error || !b) {
    alert("Error fetching baker details: " + (error ? error.message : "Not found"));
    return;
  }
  
  document.getElementById("editingId").value = b.id;
  document.getElementById("name").value = b.name || "";
  document.getElementById("category").value = b.spec || "";
  document.getElementById("logo_url").value = b.logo_key || "";
  document.getElementById("location").value = b.loc || "";
  document.getElementById("whatsapp").value = b.whatsapp || "";
  document.getElementById("experience").value = b.exp || "";
  document.getElementById("orders_completed").value = b.orders || "";
  document.getElementById("rating").value = b.rating || 4.8;
  document.getElementById("about").value = b.about || "";
  document.getElementById("products").value = JSON.stringify(b.products || [], null, 2);
  document.getElementById("reviews").value = JSON.stringify(b.reviews || [], null, 2);
  document.getElementById("areas").value = b.areas || "";
  document.getElementById("verified").checked = b.happy;
  
  document.getElementById("formTitle").textContent = "Edit Baker: " + b.name;
  document.getElementById("saveBtn").textContent = "Update Listing";
  document.getElementById("cancelBtn").style.display = "block";
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetForm() {
  document.getElementById("bakerForm").reset();
  document.getElementById("editingId").value = "";
  document.getElementById("formTitle").textContent = "Add New Baker";
  document.getElementById("saveBtn").textContent = "Save Listing";
  document.getElementById("cancelBtn").style.display = "none";
}

async function deleteBaker(id) {
  if (confirm("Are you sure you want to delete this baker?")) {
    const { error } = await supabase.from('bakers').delete().eq('id', id);
    if (error) alert(error.message);
    else loadBakers();
  }
}

document.getElementById("bakerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Processing...";

  let productsJson = [];
  try { productsJson = JSON.parse(document.getElementById("products").value || "[]"); }
  catch(err) { alert("Invalid Products JSON format!"); btn.disabled = false; return; }

  let reviewsJson = [];
  try { reviewsJson = JSON.parse(document.getElementById("reviews").value || "[]"); }
  catch(err) { alert("Invalid Reviews JSON format!"); btn.disabled = false; return; }

  const bakerData = {
    name: document.getElementById("name").value,
    spec: document.getElementById("category").value,
    logo_key: document.getElementById("logo_url").value,
    loc: document.getElementById("location").value,
    whatsapp: document.getElementById("whatsapp").value,
    exp: document.getElementById("experience").value,
    orders: document.getElementById("orders_completed").value,
    rating: parseFloat(document.getElementById("rating").value),
    about: document.getElementById("about").value,
    products: productsJson,
    reviews: reviewsJson,
    areas: document.getElementById("areas").value,
    happy: document.getElementById("verified").checked
  };

  const editingId = document.getElementById("editingId").value;
  let result;
  
  if (editingId) {
    result = await supabase.from('bakers').update(bakerData).eq('id', editingId);
  } else {
    result = await supabase.from('bakers').insert([bakerData]);
  }

  if (result.error) alert(result.error.message);
  else {
    alert(editingId ? "Updated successfully!" : "Added successfully!");
    resetForm();
    loadBakers();
  }
  btn.disabled = false;
});

document.addEventListener("DOMContentLoaded", checkUser);
</script>
</body>
</html>
