<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakers Bridge | Premium Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #3D2B1F;
      --accent: #C8962A;
      --accent-light: #E8B84B;
      --accent-dark: #9A7020;
      --bg: #FDF6EC;
      --card: #FFFFFF;
      --text: #2C1A0E;
      --text-muted: #7A5C45;
      --border: rgba(61, 43, 31, 0.1);
      --success: #2D6A4F;
      --error: #D62828;
      --shadow: 0 12px 40px rgba(61, 43, 31, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* LAYOUT */
    .dashboard { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

    /* SIDEBAR */
    aside {
      background: var(--primary); color: white; padding: 2.5rem 1.5rem;
      display: flex; flex-direction: column; gap: 2rem;
      position: sticky; top: 0; height: 100vh;
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent-light); text-decoration: none; }
    .logo span { color: white; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .nav-item {
      padding: 1rem 1.25rem; border-radius: 12px; cursor: pointer;
      transition: all 0.2s; font-weight: 500; display: flex; align-items: center; gap: 12px;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.05); }
    .nav-item.active { background: var(--accent); color: white; }
    .logout-btn { margin-top: auto; color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; cursor: pointer; background: none; border: none; text-align: left; padding: 1rem; }

    /* MAIN CONTENT */
    main { padding: 3rem; max-width: 1200px; width: 100%; margin: 0 auto; }
    header { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--primary); }

    /* CARDS */
    .card { background: var(--card); border-radius: 24px; padding: 2.5rem; border: 1px solid var(--border); box-shadow: var(--shadow); }
    
    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input, textarea, select {
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 1rem; font-family: inherit; background: #FAFAFA;
    }
    input:focus, textarea:focus { border: 2px solid var(--accent) !important; outline: none; background: white; }
    
    .btn {
      padding: 12px 28px; border-radius: 30px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; border: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 0.8rem; border-radius: 10px; }
    .btn-secondary { background: var(--bg); color: var(--primary); border: 1.5px solid var(--border); }
    .btn-upload { background: #f0f0f0; color: #555; font-size: 0.75rem; border: 1px dashed #ccc; padding: 5px 10px; border-radius: 6px; }

    /* PRODUCT TABLE */
    .product-row { display: grid; grid-template-columns: 1.5fr 0.8fr 1.5fr 1fr 40px; gap: 12px; margin-bottom: 12px; align-items: center; }
    .remove-row { color: var(--error); cursor: pointer; font-size: 1.4rem; text-align: center; }

    /* PREVIEW */
    .logo-preview-box {
      width: 70px; height: 70px; border-radius: 12px; border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--bg);
    }
    .logo-preview-box img { width: 100%; height: 100%; object-fit: cover; }

    /* LISTING TABLE */
    .baker-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .baker-table th { text-align: left; padding: 1rem; color: var(--text-muted); font-size: 0.8rem; border-bottom: 2px solid var(--bg); }
    .baker-table td { padding: 1rem; border-bottom: 1px solid var(--bg); }
    .table-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="dashboard">
    <aside>
      <a href="index.html" class="logo">Bakers<span>Bridge</span></a>
      <ul class="nav-links">
        <li class="nav-item active" onclick="switchSection('manage')">📋 Manage Listings</li>
        <li class="nav-item" onclick="switchSection('form')">✨ Add New Baker</li>
      </ul>
      <button class="logout-btn" onclick="handleLogout()">← Logout</button>
    </aside>

    <main>
      <section id="section-manage">
        <header>
          <h1>Manage Bakers</h1>
          <button class="btn btn-primary" onclick="switchSection('form')">+ New Baker</button>
        </header>
        <div class="card">
          <table class="baker-table">
            <thead>
              <tr><th>Baker</th><th>Location</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="bakerList"></tbody>
          </table>
          <div id="emptyState" class="hidden" style="text-align: center; padding: 3rem; color: var(--text-muted);">No bakers found.</div>
        </div>
      </section>

      <section id="section-form" class="hidden">
        <header>
          <h1 id="formTitle">Baker Profile</h1>
          <button class="btn btn-secondary" onclick="switchSection('manage')">Cancel</button>
        </header>
        <div class="card">
          <form id="bakerForm" autocomplete="off">
            <input type="hidden" id="editingId">
            <div class="form-grid">
              <div class="form-group">
                <label>Baker Brand Name</label>
                <input type="text" id="name" required>
              </div>
              <div class="form-group">
                <label>Specialization</label>
                <input type="text" id="spec" placeholder="e.g. Wedding Cakes">
              </div>
              <div class="form-group">
                <label>Logo (URL or Upload)</label>
                <div style="display:flex; gap:10px; align-items:center;">
                  <div class="logo-preview-box"><img id="logoPreview" src="https://i.imgur.com/yteSy8p.jpeg"></div>
                  <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                    <input type="url" id="logo_key" placeholder="URL..." oninput="updateLogoPreview(this.value)">
                    <button type="button" class="btn-upload" onclick="triggerUpload('logo_file')">📁 Upload from Gallery</button>
                    <input type="file" id="logo_file" class="hidden" accept="image/*" onchange="handleFileUpload(this, 'logo_key', 'logoPreview')">
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label>Location</label>
                <input type="text" id="loc">
              </div>
              <div class="form-group">
                <label>WhatsApp (91...)</label>
                <input type="text" id="whatsapp">
              </div>
              <div class="form-group"><label>Experience</label><input type="text" id="exp"></div>
              <div class="form-group"><label>Orders</label><input type="text" id="orders"></div>
              <div class="form-group"><label>Rating</label><input type="number" id="rating" step="0.1" value="4.8"></div>
              <div class="form-group full"><label>Areas Served</label><input type="text" id="areas"></div>
              <div class="form-group full"><label>About (Bio)</label><textarea id="baker_bio" rows="3" spellcheck="false"></textarea></div>
              
              <!-- VISUAL PRODUCT EDITOR -->
              <div class="form-group full" style="margin-top: 1rem; background: #fafafa; padding: 20px; border-radius: 15px;">
                <label style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                  Products & Menu
                  <button type="button" class="btn btn-sm btn-primary" onclick="addProductRow()">+ Add Item</button>
                </label>
                <div id="productRows"></div>
              </div>

              <div class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                <input type="checkbox" id="happy" checked> <label style="margin:0; cursor:pointer;">Verified Baker</label>
              </div>
            </div>
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
              <button type="submit" class="btn btn-primary" id="saveBtn">Save Baker Profile</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.3/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://qlkdxrryfpdmmbbqxkey.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsa2R4cnJ5ZnBkbW1iYnF4a2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTUzMDQsImV4cCI6MjA5Mjc5MTMwNH0.9dFamA3asEEQ4KCBbfyx3vVw0KvEgh2hA3nGbIptLew";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) window.location.href = "index.html"; else loadBakers();
    }

    function switchSection(id) {
      document.getElementById('section-manage').classList.toggle('hidden', id !== 'manage');
      document.getElementById('section-form').classList.toggle('hidden', id !== 'form');
      if (id === 'manage') loadBakers();
    }

    function updateLogoPreview(url) { document.getElementById('logoPreview').src = url || 'https://i.imgur.com/yteSy8p.jpeg'; }

    // UPLOAD LOGIC
    function triggerUpload(id) { document.getElementById(id).click(); }

    async function handleFileUpload(input, targetUrlId, previewImgId) {
      const file = input.files[0];
      if (!file) return;
      const originalText = input.previousElementSibling.textContent;
      input.previousElementSibling.textContent = "⌛ Uploading...";
      
      try {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random()}.${fileExt}`;
        const filePath = `uploads/${fileName}`;

        const { error: uploadError } = await supabase.storage.from('bakers').upload(filePath, file);
        if (uploadError) throw uploadError;

        const { data: { publicUrl } } = supabase.storage.from('bakers').getPublicUrl(filePath);
        document.getElementById(targetUrlId).value = publicUrl;
        if (previewImgId) document.getElementById(previewImgId).src = publicUrl;
        input.previousElementSibling.textContent = "✅ Done!";
      } catch (err) {
        alert("Upload failed: " + err.message);
        input.previousElementSibling.textContent = originalText;
      }
    }

    // PRODUCT EDITOR
    let rowCount = 0;
    function addProductRow(data = { name: '', price: '', image: '' }) {
      rowCount++;
      const id = `p-file-${rowCount}`;
      const urlId = `p-url-${rowCount}`;
      const container = document.getElementById('productRows');
      const div = document.createElement('div');
      div.className = 'product-row';
      div.innerHTML = `
        <input type="text" class="p-name" placeholder="Name" value="${data.name}">
        <input type="text" class="p-price" placeholder="Price" value="${data.price}">
        <input type="text" id="${urlId}" class="p-image" placeholder="URL" value="${data.image}">
        <button type="button" class="btn-upload" onclick="triggerUpload('${id}')">📁 Gallery</button>
        <input type="file" id="${id}" class="hidden" accept="image/*" onchange="handleFileUpload(this, '${urlId}')">
        <div class="remove-row" onclick="this.parentElement.remove()">×</div>
      `;
      container.appendChild(div);
    }

    function getProductsData() {
      const products = [];
      document.querySelectorAll('#productRows .product-row').forEach(row => {
        const name = row.querySelector('.p-name').value;
        const price = row.querySelector('.p-price').value;
        const image = row.querySelector('.p-image').value;
        if (name) products.push({ name, price, image });
      });
      return products;
    }

    async function loadBakers() {
      try {
        const { data, error } = await supabase.from('bakers').select('id, name, loc, happy, logo_key').order('created_at', { ascending: false });
        if (error) throw error;
        const list = document.getElementById("bakerList");
        list.innerHTML = "";
        if (!data || data.length === 0) return document.getElementById("emptyState").classList.remove('hidden');
        document.getElementById("emptyState").classList.add('hidden');
        data.forEach(b => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><div style="display:flex;align-items:center;gap:10px;"><img src="${b.logo_key || ''}" class="table-logo"><b>${b.name}</b></div></td>
            <td>📍 ${b.loc || 'Chennai'}</td>
            <td>${b.happy ? 'Verified' : ''}</td>
            <td><button class="btn btn-sm btn-secondary" onclick="editBaker('${b.id}')">Edit</button></td>
          `;
          list.appendChild(tr);
        });
      } catch (err) { alert(err.message); }
    }

    async function editBaker(id) {
      const btn = event.target;
      const originalText = btn.textContent;
      try {
        btn.textContent = "⌛...";
        btn.disabled = true;

        const { data: b, error } = await supabase.from('bakers').select('*').eq('id', id).single();
        if (error) throw error;
        
        document.getElementById("editingId").value = b.id;
        document.getElementById("name").value = b.name || "";
        document.getElementById("spec").value = b.spec || "";
        document.getElementById("logo_key").value = b.logo_key || "";
        document.getElementById("loc").value = b.loc || "";
        document.getElementById("whatsapp").value = b.whatsapp || "";
        document.getElementById("exp").value = b.exp || "";
        document.getElementById("orders").value = b.orders || "";
        document.getElementById("rating").value = b.rating || 4.8;
        document.getElementById("areas").value = b.areas || "";
        document.getElementById("baker_bio").value = b.about || "";
        document.getElementById("happy").checked = b.happy;
        
        document.getElementById('productRows').innerHTML = '';
        if (b.products && b.products.length > 0) {
          b.products.forEach(p => addProductRow(p));
        } else {
          addProductRow();
        }
        
        updateLogoPreview(b.logo_key);
        document.getElementById("formTitle").textContent = "✏️ Editing: " + b.name;
        document.getElementById("saveBtn").textContent = "Update Baker Profile";
        
        switchSection('form');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        alert("Edit failed: " + err.message);
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    document.getElementById("bakerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("saveBtn");
      try {
        btn.disabled = true; btn.textContent = "Saving...";
        const bakerData = {
          name: document.getElementById("name").value,
          spec: document.getElementById("spec").value,
          logo_key: document.getElementById("logo_key").value,
          loc: document.getElementById("loc").value,
          whatsapp: document.getElementById("whatsapp").value,
          exp: document.getElementById("exp").value,
          orders: document.getElementById("orders").value,
          rating: parseFloat(document.getElementById("rating").value),
          about: document.getElementById("baker_bio").value,
          areas: document.getElementById("areas").value,
          happy: document.getElementById("happy").checked,
          products: getProductsData(),
          reviews: [] // Keeping simple for now
        };
        const id = document.getElementById("editingId").value;
        const { error } = id ? await supabase.from('bakers').update(bakerData).eq('id', id) : await supabase.from('bakers').insert([bakerData]);
        if (error) throw error;
        alert("Saved!"); switchSection('manage');
      } catch (err) { alert(err.message); }
      finally { btn.disabled = false; btn.textContent = "Save Baker Profile"; }
    });

    function handleLogout() { supabase.auth.signOut().then(() => window.location.href = "index.html"); }
    checkAuth();
  </script>
</body>
</html>
