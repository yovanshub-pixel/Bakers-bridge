<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakers Bridge | High-Speed Admin</title>
  <style>
    body { font-family: sans-serif; background: #fdf6ec; padding: 20px; color: #333; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border: 1px solid #ddd; }
    h1 { color: #3d2b1f; border-bottom: 2px solid #c8962a; padding-bottom: 10px; }
    
    .section { margin-bottom: 40px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    input[type="text"], input[type="url"], input[type="number"], textarea {
      width: 100%; padding: 10px; border: 1px solid #ccc; font-family: sans-serif; font-size: 16px;
      box-sizing: border-box;
    }
    textarea { height: 120px; resize: vertical; }
    
    .btn { padding: 12px 24px; cursor: pointer; border: none; font-weight: bold; }
    .btn-save { background: #c8962a; color: #fff; }
    .btn-edit { background: #eee; margin-right: 5px; }
    .btn-delete { background: #fee; color: #d32f2f; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    
    .hidden { display: none; }
    #status { padding: 10px; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bakers Bridge Admin (High-Speed Mode)</h1>
    <p><a href="index.html">← Back to Site</a> | <button onclick="handleLogout()">Logout</button></p>

    <!-- MANAGE -->
    <div id="manageSection" class="section">
      <h2>Your Baker Listings</h2>
      <button class="btn btn-save" onclick="showForm()">+ Add New Baker</button>
      <table id="bakerTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bakerList"></tbody>
      </table>
    </div>

    <!-- FORM -->
    <div id="formSection" class="section hidden">
      <h2 id="formTitle">Add New Baker</h2>
      <button onclick="showManage()">← Back to List</button>
      <form id="bakerForm" style="margin-top:20px;">
        <input type="hidden" id="editingId">
        
        <div class="form-group">
          <label>Brand Name*</label>
          <input type="text" id="name" required>
        </div>
        
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="spec" placeholder="Cakes, Pastries, etc.">
        </div>
        
        <div class="form-group">
          <label>Logo URL</label>
          <input type="url" id="logo_key">
        </div>
        
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="loc">
        </div>
        
        <div class="form-group">
          <label>WhatsApp (91...)</label>
          <input type="text" id="whatsapp">
        </div>
        
        <div class="form-group">
          <label>Experience</label>
          <input type="text" id="exp">
        </div>
        
        <div class="form-group">
          <label>Orders Done</label>
          <input type="text" id="orders">
        </div>
        
        <div class="form-group">
          <label>Rating (0-5)</label>
          <input type="number" id="rating" step="0.1" value="4.8">
        </div>

        <div class="form-group">
          <label>Areas Served</label>
          <input type="text" id="areas">
        </div>

        <div class="form-group">
          <label>About the Baker (Bio)</label>
          <textarea id="baker_bio" spellcheck="false"></textarea>
        </div>

        <div class="form-group">
          <label>Products JSON (Optional)</label>
          <textarea id="products" spellcheck="false">[]</textarea>
        </div>

        <div class="form-group">
          <label>Reviews JSON (Optional)</label>
          <textarea id="reviews" spellcheck="false">[]</textarea>
        </div>

        <div class="form-group">
          <input type="checkbox" id="happy" checked> Verified Status
        </div>

        <button type="submit" class="btn btn-save" id="saveBtn">Save Baker Listing</button>
        <div id="status"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.3/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://qlkdxrryfpdmmbbqxkey.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsa2R4cnJ5ZnBkbW1iYnF4a2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTUzMDQsImV4cCI6MjA5Mjc5MTMwNH0.9dFamA3asEEQ4KCBbfyx3vVw0KvEgh2hA3nGbIptLew";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) window.location.href = "index.html";
      else loadBakers();
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    }

    function showForm() {
      document.getElementById('manageSection').classList.add('hidden');
      document.getElementById('formSection').classList.remove('hidden');
    }

    function showManage() {
      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('manageSection').classList.remove('hidden');
      loadBakers();
    }

    async function loadBakers() {
      const { data, error } = await supabase.from('bakers').select('id, name, loc').order('created_at', { ascending: false });
      if (error) return alert(error.message);
      
      const list = document.getElementById("bakerList");
      list.innerHTML = "";
      data.forEach(b => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${b.name}</td>
          <td>${b.loc || ''}</td>
          <td>
            <button class="btn btn-edit" onclick="editBaker('${b.id}')">Edit</button>
            <button class="btn btn-delete" onclick="deleteBaker('${b.id}')">Delete</button>
          </td>
        `;
        list.appendChild(tr);
      });
    }

    async function editBaker(id) {
      const { data: b, error } = await supabase.from('bakers').select('*').eq('id', id).single();
      if (error) return alert(error.message);
      
      document.getElementById("editingId").value = b.id;
      document.getElementById("name").value = b.name || "";
      document.getElementById("spec").value = b.spec || "";
      document.getElementById("logo_key").value = b.logo_key || "";
      document.getElementById("loc").value = b.loc || "";
      document.getElementById("whatsapp").value = b.whatsapp || "";
      document.getElementById("exp").value = b.exp || "";
      document.getElementById("orders").value = b.orders || "";
      document.getElementById("rating").value = b.rating || 4.8;
      document.getElementById("areas").value = b.areas || "";
      document.getElementById("baker_bio").value = b.about || "";
      document.getElementById("happy").checked = b.happy;
      document.getElementById("products").value = JSON.stringify(b.products || []);
      document.getElementById("reviews").value = JSON.stringify(b.reviews || []);
      
      document.getElementById("formTitle").textContent = "Edit: " + b.name;
      showForm();
    }

    async function deleteBaker(id) {
      if (confirm("Delete this baker?")) {
        await supabase.from('bakers').delete().eq('id', id);
        loadBakers();
      }
    }

    document.getElementById("bakerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const status = document.getElementById("status");
      status.textContent = "Saving... please wait...";
      status.style.color = "blue";
      
      try {
        const bakerData = {
          name: document.getElementById("name").value || "New Baker",
          spec: document.getElementById("spec").value || "",
          logo_key: document.getElementById("logo_key").value || "",
          loc: document.getElementById("loc").value || "",
          whatsapp: document.getElementById("whatsapp").value || "",
          exp: document.getElementById("exp").value || "",
          orders: document.getElementById("orders").value || "",
          rating: parseFloat(document.getElementById("rating").value) || 4.8,
          about: document.getElementById("baker_bio").value || "",
          areas: document.getElementById("areas").value || "",
          happy: document.getElementById("happy").checked,
          products: JSON.parse(document.getElementById("products").value || "[]"),
          reviews: JSON.parse(document.getElementById("reviews").value || "[]")
        };

        const id = document.getElementById("editingId").value;
        const { error } = id ? 
          await supabase.from('bakers').update(bakerData).eq('id', id) : 
          await supabase.from('bakers').insert([bakerData]);

        if (error) throw error;
        
        status.textContent = "Success!";
        status.style.color = "green";
        setTimeout(() => {
          document.getElementById("bakerForm").reset();
          document.getElementById("editingId").value = "";
          showManage();
        }, 1000);
      } catch (err) {
        status.textContent = "Error: " + err.message;
        status.style.color = "red";
      }
    });

    checkAuth();
  </script>
</body>
</html>
