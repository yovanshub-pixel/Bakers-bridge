<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakers Bridge | Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#FDF6EC;--warm:#F5E6CC;--gold:#C8962A;--gold-light:#E8B84B;
  --gold-dark:#9A7020;--brown:#3D2B1F;--brown-mid:#6B4C35;--brown-light:#9A7B65;
  --text:#2C1A0E;--text-muted:#7A5C45;--white:#FFFFFF;--card:#FFFDF8;
  --border:rgba(200,150,42,0.18);
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text); min-height: 100vh;}

nav{background:var(--white); border-bottom:1px solid var(--border); padding:0 3rem; height:68px; display:flex; align-items:center; justify-content:space-between;}
.logo-text{font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--brown); text-decoration:none;}
.logo-text span{color:var(--gold);}

.container{max-width:1100px; margin:3rem auto; padding:0 2rem;}
.header{margin-bottom:3rem; display:flex; justify-content:space-between; align-items:flex-end;}
.header h1{font-family:'Cormorant Garamond',serif; font-size:2.5rem; color:var(--brown);}

.card{background:var(--card); border-radius:18px; border:1px solid var(--border); padding:2rem; box-shadow:0 8px 32px rgba(61,43,31,0.05); margin-bottom:2rem;}
.card h2{font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--brown); margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem;}

.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;}
.form-group{display:flex; flex-direction:column; gap:0.5rem;}
.form-group label{font-size:13px; font-weight:600; color:var(--brown-mid);}
.form-group input, .form-group select, .form-group textarea{
  padding:12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:'Outfit',sans-serif; outline:none;
}
.form-group input:focus, .form-group textarea:focus{border-color:var(--gold);}

.btn-primary{background:var(--gold); color:var(--white); border:none; padding:12px 24px; border-radius:30px; font-size:15px; font-weight:600; cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.2s;}
.btn-primary:hover{background:var(--gold-dark); transform:translateY(-2px);}

.baker-list{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1rem;}
.baker-item{background:var(--white); padding:1rem; border-radius:12px; border:1px solid var(--border); display:flex; align-items:center; gap:1rem;}
.baker-item img{width:50px; height:50px; border-radius:8px; object-fit:cover;}

#loadingOverlay{position:fixed; inset:0; background:rgba(253,246,236,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;}

@media(max-width:768px){.form-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loadingOverlay">
  <p>Verifying access...</p>
</div>

<nav>
  <a href="index.html" class="logo-text">Bakers <span>Bridge</span> Admin</a>
  <button class="btn-primary" onclick="handleLogout()" style="padding:8px 20px; font-size:13px;">Logout</button>
</nav>

<div class="container">
  <div class="header">
    <h1 id="welcomeText">Welcome Back</h1>
    <a href="index.html" class="btn-primary" style="padding:10px 20px; text-decoration:none; font-size:14px;">View Live Site</a>
  </div>

  <div class="card">
    <h2>Add / Update Baker Profile</h2>
    <form id="bakerForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Baker Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="category" placeholder="e.g. Cakes & Pastries">
        </div>
        <div class="form-group">
          <label>Logo URL</label>
          <input type="url" id="logo_url">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location">
        </div>
        <div class="form-group">
          <label>WhatsApp (with 91)</label>
          <input type="text" id="whatsapp">
        </div>
        <div class="form-group">
          <label>Experience (e.g. 3 Years)</label>
          <input type="text" id="experience">
        </div>
        <div class="form-group">
          <label>Orders Completed (e.g. 500+)</label>
          <input type="text" id="orders_completed">
        </div>
        <div class="form-group">
          <label>Rating (1-5)</label>
          <input type="number" id="rating" step="0.1" value="4.8">
        </div>
        <div class="form-group" style="grid-column: 1/-1;">
          <label>About The Baker</label>
          <textarea id="about" rows="4" placeholder="Tell customers about your story and baking style..."></textarea>
        </div>
        
        <div class="form-group" style="grid-column: 1/-1;">
          <label>Products (JSON List)</label>
          <p style="font-size:11px; color:var(--text-muted); margin-bottom:5px;">Paste your products list here. Example: [{"name":"Chocolate Cake", "price":"₹800", "image":""}]</p>
          <textarea id="products" rows="4" placeholder='[{"name":"Cake Name", "price":"₹Price", "image":"URL"}]'></textarea>
        </div>

        <div class="form-group" style="grid-column: 1/-1;">
          <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
            <input type="checkbox" id="verified" checked style="width:auto;"> This baker is verified
          </label>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="saveBtn" style="margin-top:1.5rem;">Save Baker Profile</button>
    </form>
  </div>

  <div class="card">
    <h2>Your Listings</h2>
    <div id="bakerList" class="baker-list">
      <!-- Listings -->
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://qlkdxrryfpdmmbbqxkey.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsa2R4cnJ5ZnBkbW1iYnF4a2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTUzMDQsImV4cCI6MjA5Mjc5MTMwNH0.9dFamA3asEEQ4KCBbfyx3vVw0KvEgh2hA3nGbIptLew";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("welcomeText").textContent = "Welcome, " + user.email.split('@')[0];
    document.getElementById("loadingOverlay").style.display = "none";
    loadBakers();
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  window.location.href = "index.html";
}

async function loadBakers() {
  const { data, error } = await supabase.from('bakers').select('*').order('created_at', { ascending: false });
  if (error) return;
  const list = document.getElementById("bakerList");
  list.innerHTML = "";
  data.forEach(b => {
    const div = document.createElement("div");
    div.className = "baker-item";
    div.innerHTML = `<img src="${b.logo_url || 'https://i.imgur.com/yteSy8p.jpeg'}"> <div><strong>${b.name}</strong><br><small>${b.location}</small></div>`;
    list.appendChild(div);
  });
}

document.getElementById("bakerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  let productsJson = [];
  try {
    const val = document.getElementById("products").value.trim();
    productsJson = val ? JSON.parse(val) : [];
  } catch(e) {
    alert("Error in Products JSON! Please check the format.");
    btn.disabled = false;
    btn.textContent = "Save Baker Profile";
    return;
  }

  const bakerData = {
    name: document.getElementById("name").value,
    category: document.getElementById("category").value,
    logo_url: document.getElementById("logo_url").value,
    location: document.getElementById("location").value,
    whatsapp: document.getElementById("whatsapp").value,
    experience: document.getElementById("experience").value,
    orders_completed: document.getElementById("orders_completed").value,
    rating: parseFloat(document.getElementById("rating").value),
    about: document.getElementById("about").value,
    products: productsJson,
    verified: document.getElementById("verified").checked
  };

  const { error } = await supabase.from('bakers').insert([bakerData]);
  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("Baker added successfully!");
    document.getElementById("bakerForm").reset();
    loadBakers();
  }
  btn.disabled = false;
  btn.textContent = "Save Baker Profile";
});

document.addEventListener("DOMContentLoaded", checkUser);
</script>
</body>
</html>
